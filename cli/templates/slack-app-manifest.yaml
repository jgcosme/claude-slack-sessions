display_information:
  name: claude
  description: Drive Claude Code from Slack — one isolated session per thread.

features:
  bot_user:
    display_name: claude
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - im:history
      - im:read
      - app_mentions:read
      - channels:history
      - groups:history
      - reactions:write

settings:
  event_subscriptions:
    bot_events:
      - message.im
      - app_mention
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
